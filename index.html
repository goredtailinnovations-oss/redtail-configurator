<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedTail Guard Series — Configurator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#D41A2B;--bg:#111;--panel:#161616;--border:#222;--t:#f0f0f0}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'Barlow',sans-serif;overflow:hidden}
#hdr{position:fixed;top:0;left:0;right:0;height:50px;background:#0a0a0a;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:99}
.hlogo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;color:var(--red)}
.hdiv{width:1px;height:22px;background:#2a2a2a}
.htitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:.08em;color:#666;text-transform:uppercase}
.hbadge{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--red);background:rgba(212,26,43,.1);border:1px solid rgba(212,26,43,.3);padding:3px 10px;border-radius:3px;text-transform:uppercase}
#app{display:flex;height:100vh;padding-top:50px}
#pnl{width:296px;min-width:296px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sec{padding:14px;border-bottom:1px solid var(--border)}
.slbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.16em;color:#3a3a3a;text-transform:uppercase;margin-bottom:9px}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mbtn{background:#1a1a1a;border:1.5px solid #222;color:#555;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:9px 6px;border-radius:4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .1s}
.mbtn span{font-size:8px;font-weight:400;color:#2a2a2a}
.mbtn:hover{border-color:#333;color:#aaa}
.mbtn.on{border-color:var(--red);color:#fff;background:rgba(212,26,43,.06)}
.mbtn.on span{color:var(--red)}
.crow{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.csw{position:relative;width:32px;height:32px;border-radius:4px;overflow:hidden;border:2px solid #252525;flex-shrink:0}
.csw input[type=color]{position:absolute;top:-4px;left:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border:none;padding:0;cursor:pointer}
.dots{display:flex;gap:4px;flex-wrap:wrap}
.dot{width:17px;height:17px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform .1s}
.dot:hover{transform:scale(1.2)}
.dot.on{border-color:#fff;box-shadow:0 0 0 1px #fff}
.hexlbl{font-size:10px;color:#333;font-family:monospace}
.ttabs{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:11px}
.ttab{background:#1a1a1a;border:1.5px solid #222;color:#444;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:7px 3px;border-radius:4px;cursor:pointer;text-align:center;transition:all .1s}
.ttab:hover{border-color:#333;color:#aaa}
.ttab.on{border-color:var(--red);color:#fff;background:rgba(212,26,43,.06)}
.cpnl{display:none}.cpnl.on{display:block}
.ilbl{font-size:10px;color:#333;letter-spacing:.08em;margin-bottom:4px;text-transform:uppercase}
.txtin{width:100%;background:#0d0d0d;border:1.5px solid #222;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;text-align:center;padding:7px;border-radius:4px;outline:none;text-transform:uppercase}
.txtin:focus{border-color:var(--red)}
.txtin::placeholder{color:#1e1e1e}
.upbtn{width:100%;background:#0d0d0d;border:1.5px dashed #252525;color:#3a3a3a;font-size:12px;padding:14px;border-radius:4px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .1s}
.upbtn:hover{border-color:var(--red);color:#888}
.upbtn input{display:none}
.lthumb{width:100%;height:55px;object-fit:contain;background:#0d0d0d;border-radius:4px;display:none;margin-top:7px;border:1.5px solid #222}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.pbtn{background:#1a1a1a;border:1.5px solid #222;color:#333;font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 2px;border-radius:3px;cursor:pointer;text-align:center;transition:all .1s}
.pbtn:hover{border-color:#333;color:#aaa}
.pbtn.on{border-color:var(--red);color:#fff;background:rgba(212,26,43,.06)}
.pblk{border:1.5px solid transparent;background:transparent}
.slw{margin-bottom:7px}
.slrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
input[type=range]{width:100%;accent-color:var(--red);cursor:pointer}
.slv{font-size:11px;color:var(--red);font-family:monospace}
.acts{padding:13px;display:flex;flex-direction:column;gap:6px;margin-top:auto}
.btn1{width:100%;background:var(--red);color:#fff;border:none;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:11px;border-radius:4px;cursor:pointer}
.btn1:hover{background:#b51523}
.btn2{width:100%;background:transparent;color:#3a3a3a;border:1.5px solid #222;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px;border-radius:4px;cursor:pointer}
.btn2:hover{border-color:#444;color:#aaa}
#vp{flex:1;position:relative;overflow:hidden;background:#444}
#cvwrap{position:absolute;inset:0;width:100%;height:100%}
#cvwrap canvas{width:100%!important;height:100%!important}
#statbar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);border:1px solid rgba(212,26,43,.3);color:rgba(255,255,255,.5);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.1em;padding:4px 12px;border-radius:20px;pointer-events:none;white-space:nowrap;text-transform:uppercase;transition:opacity .4s}
#fvbtn{position:absolute;top:10px;right:13px;background:rgba(0,0,0,.6);border:1px solid #252525;color:#555;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 11px;border-radius:3px;cursor:pointer;z-index:2}
#fvbtn:hover{border-color:#555;color:#ccc}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.15);pointer-events:none;white-space:nowrap}
#pov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center}
#pov.on{display:flex}
.pmod{background:#161616;border:1px solid #252525;border-radius:8px;padding:22px;width:420px;display:flex;flex-direction:column;gap:12px}
.pmod h2{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
#pprev{width:100%;border-radius:4px;border:1px solid #222}
.szrow{display:flex;gap:6px}
.szopt{flex:1;background:#111;border:1.5px solid #222;color:#444;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px;border-radius:4px;cursor:pointer;text-align:center}
.szopt.on{border-color:var(--red);color:#fff}
.macts{display:flex;gap:6px}
.macts .btn1,.macts .btn2{flex:1}
</style>
</head>
<body>
<div id="hdr">
  <span class="hlogo">RedTail</span>
  <div class="hdiv"></div>
  <span class="htitle">Guard Series — 3D Configurator</span>
  <span class="hbadge" id="badge">Aero Thighpad</span>
</div>

<div id="app">
 <div id="pnl">
  <div class="sec">
    <div class="slbl">Model</div>
    <div class="mrow">
      <button class="mbtn on" onclick="setModel('aero',this)">AERO<span>Thighpad</span></button>
      <button class="mbtn" onclick="setModel('fortress',this)">FORTRESS<span>Thighpad</span></button>
    </div>
  </div>
  <div class="sec">
    <div class="slbl">Pad Color</div>
    <div class="crow">
      <div class="csw"><input type="color" id="pc" value="#ffffff" oninput="setPadColor(this.value)"></div>
      <div class="dots" id="pdots"></div>
    </div>
    <div class="hexlbl" id="phex">#ffffff</div>
  </div>
  <div class="sec">
    <div class="slbl">Customization</div>
    <div class="ttabs">
      <button class="ttab on" onclick="setType('number',this)">Number</button>
      <button class="ttab"    onclick="setType('letter',this)">Letters</button>
      <button class="ttab"    onclick="setType('logo',this)">Logo</button>
    </div>
    <div class="cpnl on" id="pnl-number">
      <div class="ilbl">Jersey Number</div>
      <input class="txtin" id="num-in" maxlength="3" placeholder="00" oninput="refresh()">
    </div>
    <div class="cpnl" id="pnl-letter">
      <div class="ilbl">Text / Initials</div>
      <input class="txtin" id="let-in" maxlength="4" placeholder="RT" oninput="refresh()">
    </div>
    <div class="cpnl" id="pnl-logo">
      <label class="upbtn">
        <span style="font-size:22px">⬆</span>
        <span id="uplbl">Upload Team Logo</span>
        <span style="font-size:10px;color:#2a2a2a">PNG with transparent background</span>
        <input type="file" id="logofile" accept="image/*" onchange="onLogoUpload(event)">
      </label>
      <img id="lthumb" class="lthumb">
    </div>
  </div>
  <div class="sec">
    <div class="slbl">Design Color</div>
    <div class="crow">
      <div class="csw"><input type="color" id="dc" value="#ffffff" oninput="setDesignColor(this.value)"></div>
      <div class="dots" id="ddots"></div>
    </div>
    <div class="hexlbl" id="dhex">#ffffff</div>
  </div>

  <div class="sec">
    <div class="slbl">Emboss / Scale</div>
    <div class="slw">
      <div class="slrow"><span class="ilbl" style="margin:0">Depth</span><span class="slv" id="ev">6</span></div>
      <input type="range" min="0" max="10" value="6" id="esl" oninput="S.emboss=+this.value;document.getElementById('ev').textContent=this.value;refresh()">
    </div>
    <div class="slw">
      <div class="slrow"><span class="ilbl" style="margin:0">Scale</span><span class="slv" id="sv">200</span></div>
      <input type="range" min="20" max="250" value="200" id="ssl" oninput="S.scale=+this.value;document.getElementById('sv').textContent=this.value;refresh()">
    </div>
  </div>
  <div class="acts">
    <button class="btn1" onclick="openExport()">⬇ &nbsp;Export / Print</button>
    <button class="btn2" onclick="doReset()">Reset</button>
  </div>
 </div>

 <div id="vp">
   <div id="cvwrap"></div>
   <div id="statbar">Loading model…</div>
   <button id="fvbtn" onclick="resetCam()">⟳ Front View</button>
   <div id="hint">Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>
 </div>
</div>

<div id="pov">
 <div class="pmod">
   <h2>Export Configuration</h2>
   <img id="pprev" src="" alt="">
   <div class="szrow">
     <div class="szopt on" onclick="setSz('screen',this)">Screen</div>
     <div class="szopt" onclick="setSz('2k',this)">2K</div>
     <div class="szopt" onclick="setSz('4k',this)">4K</div>
   </div>
   <div class="macts">
     <button class="btn1" onclick="doDownload()">Save Image</button>
     <button class="btn2" onclick="doPrint()">Print</button>
     <button class="btn2" onclick="document.getElementById('pov').classList.remove('on')">Cancel</button>
   </div>
 </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>

// ── Model paths ───────────────────────────────────────────────────────────────
// Place aero-thighpad.glb and fortress-thighpad.glb in the same folder as index.html
const MODEL_URLS = {
  aero:     'aero-thighpad.glb',
  fortress: 'fortress-thighpad.glb',
};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  model:'aero', padColor:'#ffffff',
  type:'number', text:'', deColor:'#ffffff',
  logo:null, emboss:6, scale:200, pos:'center',
};
let exportSz = 'screen';

// ── Three.js refs ─────────────────────────────────────────────────────────────
let renderer, scene, camera, controls;
let padGroup  = null;  // Group: model + text plane
let padMeshes = [];    // All meshes inside the model (to recolor)
let textMesh  = null;  // The text/logo plane
let textMat   = null;

// ── Color presets ─────────────────────────────────────────────────────────────
const PAD_C = ['#ffffff','#ffd700','#c8102e','#003087','#154734','#ff8200','#000000','#888888'];
const DES_C = ['#ffffff','#ffd700','#c8102e','#003087','#154734','#ff8200','#000000','#888888'];

function makeDots(id, colors, cb) {
  const wrap = document.getElementById(id);
  colors.forEach(hex => {
    const el = document.createElement('div');
    el.className = 'dot'; el.style.background = hex;
    el.addEventListener('click', () => {
      wrap.querySelectorAll('.dot').forEach(d => d.classList.remove('on'));
      el.classList.add('on'); cb(hex);
    });
    wrap.appendChild(el);
  });
}
makeDots('pdots', PAD_C, h => { document.getElementById('pc').value=h; setPadColor(h); });
makeDots('ddots', DES_C, h => { document.getElementById('dc').value=h; setDesignColor(h); });

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  const wrap = document.getElementById('cvwrap');
  const W = wrap.clientWidth  || window.innerWidth  - 296;
  const H = wrap.clientHeight || window.innerHeight - 50;

  renderer = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.shadowMap.enabled = true;
  renderer.outputEncoding = THREE.LinearEncoding;
  renderer.toneMapping = THREE.NoToneMapping;
  renderer.toneMappingExposure = 1.0;
  wrap.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x444444);

  camera = new THREE.PerspectiveCamera(36, W/H, 0.05, 100);
  camera.position.set(0, 0.2, 5.5);

  // Light calibration: total intensity kept near 1.0 so rendered surface color
  // matches the chosen hex value. Ambient carries most of the load for color
  // accuracy; directional lights are subtle — just enough to show 3D geometry.
  scene.add(new THREE.AmbientLight(0xffffff, 0.50));
  const key = new THREE.DirectionalLight(0xffffff, 0.28);
  key.position.set(1.5, 2, 5); key.castShadow = true; scene.add(key);
  const fill = new THREE.DirectionalLight(0xffffff, 0.08);
  fill.position.set(-3, 1, 2); scene.add(fill);
  const rim = new THREE.DirectionalLight(0xffffff, 0.06);
  rim.position.set(0, -3, -3); scene.add(rim);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.07;
  controls.minDistance = 1; controls.maxDistance = 15;

  window.addEventListener('resize', () => {
    const nW = wrap.clientWidth  || window.innerWidth-296;
    const nH = wrap.clientHeight || window.innerHeight-50;
    renderer.setSize(nW, nH);
    camera.aspect = nW/nH; camera.updateProjectionMatrix();
  });

  loadModel('aero');

  (function loop() {
    requestAnimationFrame(loop);
    controls.update();
    renderer.render(scene, camera);
  })();
}

function resetCam() {
  camera.position.set(0, 0.2, 5.5);
  controls.target.set(0, 0, 0);
  controls.update();
}

function setStatus(msg) {
  const el = document.getElementById('statbar');
  el.textContent = msg;
  el.style.opacity = msg ? '1' : '0';
}

// ── Load model ────────────────────────────────────────────────────────────────
//
// The GLB models are oriented with:
//   X = width (~140mm)
//   Y = thickness (~31mm) ← the thin dimension; face normal is in ±Y
//   Z = height (~147mm)
//
// We rotate -90° on X so the face (which was pointing +Y) now points +Z toward camera.
// After rotation:  old +Y → new +Z (front face toward camera) ✓
//                  old +Z → new -Y (top of pad goes down — compensate with +90° = flip sign)
//
// Actually: rotation.x = -PI/2 maps:
//   old Y axis → new -Z axis  (so old +Y face → now faces -Z = away from camera)
// We want old +Y to face +Z, so we need rotation.x = +PI/2:
//   rotation.x = +PI/2 maps old +Y → new +Z ✓
//
function loadModel(variant) {
  setStatus('Loading…');

  if (padGroup) {
    scene.remove(padGroup);
    padGroup.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        (Array.isArray(o.material) ? o.material : [o.material])
          .forEach(m => { if (m.map) m.map.dispose(); m.dispose(); });
      }
    });
    padGroup = null; padMeshes = []; textMesh = null; textMat = null;
  }

  const loader = new THREE.GLTFLoader();
  loader.load(
    MODEL_URLS[variant],
    gltf => {
      const model = gltf.scene;

      // ── 1. Collect all meshes and replace materials ──────────────────────
      padMeshes = [];
      model.traverse(obj => {
        if (!obj.isMesh) return;
        const mat = new THREE.MeshStandardMaterial({
          color: new THREE.Color(S.padColor),
          roughness: 0.68,
          metalness: 0.05,
          toneMapped: false,
        });
        obj.material = mat;
        obj.castShadow = true;
        obj.receiveShadow = true;
        padMeshes.push(obj);
      });

      // ── 2. Rotate to face camera ─────────────────────────────────────────
      // Models lie flat: face normal along +Y. Rotate +90° on X → face points +Z.
      model.rotation.x = Math.PI / 2;

      // ── 3. Scale and center ───────────────────────────────────────────────
      // Apply rotation before computing bbox so we measure the rotated orientation
      model.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      // Scale so the tall dimension (now Y after rotation) fits ~3.2 units
      const targetH = 3.2;
      const scale = targetH / size.y;
      model.scale.setScalar(scale);

      // Re-center after scaling
      model.updateMatrixWorld(true);
      const box2 = new THREE.Box3().setFromObject(model);
      const center2 = box2.getCenter(new THREE.Vector3());
      model.position.sub(center2);

      // ── 4. Text plane ─────────────────────────────────────────────────────
      // Placed at the front face (max Z of the model after all transforms)
      model.updateMatrixWorld(true);
      const box3 = new THREE.Box3().setFromObject(model);
      const frontZ = box3.max.z + 0.005;
      const padW   = box3.max.x - box3.min.x;
      const padH   = box3.max.y - box3.min.y;

      const texCanvas = makeTextCanvas(padW, padH);
      const tex = new THREE.CanvasTexture(texCanvas);
      // Tell Three.js this texture is already in sRGB — prevents double gamma encode
      tex.encoding = THREE.sRGBEncoding;
      tex.needsUpdate = true;

      textMat = new THREE.MeshBasicMaterial({
        map: tex,
        transparent: true,
        depthTest: true,
        depthWrite: false,
        polygonOffset: true,
        polygonOffsetFactor: -4,
        polygonOffsetUnits: -4,
        // Opt out of tone mapping so ACES/filmic pipeline does not shift logo colors
        toneMapped: false,
      });

      textMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(padW * 0.82, padH * 0.85),
        textMat
      );
      // model is already centered at world origin inside padGroup,
      // so (box3.min+max)/2 ≈ 0 in X and Y — do NOT subtract model.position
      // (which is -center2 and would shift the decal off-face).
      textMesh.position.set(
        (box3.min.x + box3.max.x) / 2,
        (box3.min.y + box3.max.y) / 2,
        frontZ
      );
      textMesh.renderOrder = 1;

      // ── 5. Group and add to scene ─────────────────────────────────────────
      padGroup = new THREE.Group();
      padGroup.add(model);
      padGroup.add(textMesh);
      scene.add(padGroup);

      setStatus('');
    },
    xhr => {
      const pct = xhr.total ? Math.round(xhr.loaded / xhr.total * 100) : '…';
      setStatus(`Loading ${pct}%`);
    },
    err => {
      console.error(err);
      setStatus('Error loading model');
    }
  );
}

// ── Text/logo canvas ──────────────────────────────────────────────────────────
// padW and padH are the real 3D dimensions of the pad face in scene units.
// We use them to set font size proportionally.
function makeTextCanvas(padW, padH) {
  // Store for refresh() calls
  if (padW !== undefined) makeTextCanvas._padW = padW;
  if (padH !== undefined) makeTextCanvas._padH = padH;
  const pw = makeTextCanvas._padW || 1.5;
  const ph = makeTextCanvas._padH || 3.2;

  const SZ = 1024;
  const cv = document.createElement('canvas');
  cv.width = SZ; cv.height = SZ;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, SZ, SZ);

  const hasText = (S.type === 'number' || S.type === 'letter') && S.text.trim().length > 0;
  const hasLogo = S.type === 'logo' && S.logo !== null;
  if (!hasText && !hasLogo) return cv;

  const sc = S.scale / 100;

  // Position: canvas (SZ*0.5, SZ*0.5) = plane center = pad face center
  // PlaneGeometry UVs: (0,0)=bottom-left, (1,1)=top-right, flipY applied by CanvasTexture
  // So canvas Y increases downward, matching screen coords. "top" = small Y, "bottom" = large Y.
  const CX = { left:SZ*0.22, center:SZ*0.50, right:SZ*0.78 };
  const CY = { top:SZ*0.22,  center:SZ*0.50, bottom:SZ*0.78 };
  const cx = CX[S.pos] !== undefined ? CX[S.pos] : SZ*0.50;
  const cy = CY[S.pos] !== undefined ? CY[S.pos] : SZ*0.50;

  if (hasText) {
    const t = S.text.toUpperCase().trim();
    // Larger base: jersey numbers should dominate the pad face
    const base = SZ * 0.54;
    const charScale = t.length === 1 ? 1.0 : t.length === 2 ? 0.85 : 0.66;
    const fs = Math.round(base * charScale * sc);

    ctx.font         = `900 ${fs}px 'Barlow Condensed', Arial, sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // Physical raised-letter emboss — same material as pad surface.
    // Small fixed shadow offset (like real geometry) + face color + edge glint.
    // d is deliberately small and capped so it never reads as a separate letter.
    const e  = S.emboss / 10;
    const d  = Math.min(18, Math.max(3, Math.round(fs * 0.055 * e)));

    if (S.emboss > 0) {
      // Pass 1: cast shadow (dark, tight offset — only visible at letter edges)
      ctx.fillStyle = `rgba(0,0,0,${(0.80 * e).toFixed(2)})`;
      ctx.fillText(t, cx + d, cy + d);

      // Pass 2: face — design color, sits on top covering most of shadow
      ctx.fillStyle = S.deColor;
      ctx.fillText(t, cx, cy);

      // Pass 3: top-left edge glint (1-2px sliver of highlight on raised face)
      // Derive lighter version of design color for same-material look
      const hx = S.deColor.replace('#','');
      const fr = parseInt(hx.slice(0,2),16);
      const fg_c = parseInt(hx.slice(2,4),16);
      const fb = parseInt(hx.slice(4,6),16);
      const gR = Math.round(fr + (255-fr) * 0.55);
      const gG = Math.round(fg_c + (255-fg_c) * 0.55);
      const gB = Math.round(fb + (255-fb) * 0.55);
      ctx.fillStyle = `rgba(${gR},${gG},${gB},${(0.70 * e).toFixed(2)})`;
      ctx.fillText(t, cx - Math.max(1, Math.round(d * 0.35)), cy - Math.max(1, Math.round(d * 0.35)));
    } else {
      ctx.fillStyle = S.deColor;
      ctx.fillText(t, cx, cy);
    }

  } else if (hasLogo) {
    const img  = S.logo;
    const maxD = SZ * 0.65 * sc;
    const r    = Math.min(maxD / img.width, maxD / img.height);
    const dw   = img.width  * r;
    const dh   = img.height * r;
    const lx   = cx - dw / 2;
    const ly   = cy - dh / 2;

    // Logo emboss: preserve original PNG colors exactly on face.
    // Only the cast shadow changes with depth — no tinting, no glint pass.
    // Shadow uses the logo's own alpha as a mask so transparent areas stay clean.
    const e = S.emboss / 10;
    const d = Math.min(16, Math.max(2, Math.round(dh * 0.055 * e)));

    if (S.emboss > 0) {
      // Pass 1: cast shadow — offset copy filled black through logo's alpha mask
      ctx.save();
      ctx.drawImage(img, lx + d, ly + d, dw, dh);
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = `rgba(0,0,0,${Math.min(0.75, 0.70 * e + 0.10).toFixed(2)})`;
      ctx.fillRect(lx + d, ly + d, dw, dh);
      ctx.restore();
    }

    // Pass 2: face — raw original PNG, zero compositing, zero tint
    ctx.drawImage(img, lx, ly, dw, dh);
    // No glint pass — white overlay destroys light colors (silver→white, green→teal)
  }

  return cv;
}

// ── Refresh textures ──────────────────────────────────────────────────────────
function refresh() {
  if (S.type === 'number') S.text = document.getElementById('num-in').value;
  else if (S.type === 'letter') S.text = document.getElementById('let-in').value;

  // Recolor pad meshes
  padMeshes.forEach(m => {
    m.material.color.set(S.padColor);
    m.material.needsUpdate = true;
  });

  // Redraw text canvas
  if (!textMat) return;
  if (textMat.map) textMat.map.dispose();
  const tc = makeTextCanvas();
  textMat.map = new THREE.CanvasTexture(tc);
  textMat.map.encoding = THREE.sRGBEncoding;
  textMat.map.needsUpdate = true;
  textMat.needsUpdate = true;
}

// ── UI handlers ───────────────────────────────────────────────────────────────
function setModel(v, btn) {
  S.model = v;
  document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('badge').textContent = v === 'aero' ? 'Aero Thighpad' : 'Fortress Thighpad';
  loadModel(v);
}

function setType(t, btn) {
  S.type = t;
  document.querySelectorAll('.ttab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.cpnl').forEach(p => p.classList.remove('on'));
  document.getElementById('pnl-' + t).classList.add('on');
  if (t === 'number') S.text = document.getElementById('num-in').value;
  else if (t === 'letter') S.text = document.getElementById('let-in').value;
  else S.text = '';
  refresh();
}

function setPadColor(hex) {
  S.padColor = hex;
  document.getElementById('phex').textContent = hex;
  refresh();
}

function setDesignColor(hex) {
  S.deColor = hex;
  document.getElementById('dhex').textContent = hex;
  refresh();
}

// Removes background pixels using edge flood-fill (like Photoshop magic wand from corners).
// Only pixels connected to the image border that are near-white get removed.
// Interior white/silver pixels (part of the logo) are never touched.
function removeWhiteBg(img) {
  const oc = document.createElement('canvas');
  oc.width = img.width; oc.height = img.height;
  const ox = oc.getContext('2d');
  ox.drawImage(img, 0, 0);
  const id = ox.getImageData(0, 0, oc.width, oc.height);
  const d = id.data;
  const W = oc.width, H = oc.height;
  const visited = new Uint8Array(W * H);

  // Is this pixel near-white (background candidate)?
  function isWhitish(idx) {
    return d[idx] >= 230 && d[idx+1] >= 230 && d[idx+2] >= 230 && d[idx+3] > 10;
  }

  // BFS flood fill from seed pixel — marks connected near-white pixels
  function flood(startX, startY) {
    const stack = [[startX, startY]];
    while (stack.length) {
      const [x, y] = stack.pop();
      if (x < 0 || x >= W || y < 0 || y >= H) continue;
      const pos = y * W + x;
      if (visited[pos]) continue;
      visited[pos] = 1;
      const i = pos * 4;
      if (!isWhitish(i)) continue;
      // Mark for removal with graduated alpha for anti-alias fringe
      const brightness = (d[i] + d[i+1] + d[i+2]) / 3;
      const fade = (brightness - 200) / 55; // 0 at 200, 1 at 255
      d[i+3] = Math.round(d[i+3] * Math.max(0, 1 - fade));
      // Check 4-connected neighbors
      stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
    }
  }

  // Seed from all four edges — only background pixels are reachable from here
  for (let x = 0; x < W; x++) { flood(x, 0); flood(x, H-1); }
  for (let y = 0; y < H; y++) { flood(0, y); flood(W-1, y); }

  ox.putImageData(id, 0, 0);
  const out = new Image();
  out.src = oc.toDataURL('image/png');
  return out;
}

function onLogoUpload(e) {
  const f = e.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      // Strip white background so logo sits cleanly on the pad surface
      S.logo = removeWhiteBg(img, 240);
      document.getElementById('lthumb').src = ev.target.result;
      document.getElementById('lthumb').style.display = 'block';
      document.getElementById('uplbl').textContent = f.name;
      S.type = 'logo'; S.text = '';
      document.querySelectorAll('.ttab').forEach(b => b.classList.remove('on'));
      document.querySelector('.ttab:nth-child(3)').classList.add('on');
      document.querySelectorAll('.cpnl').forEach(p => p.classList.remove('on'));
      document.getElementById('pnl-logo').classList.add('on');
      // Small delay to allow the new Image src to load before refresh renders it
      S.logo.onload = () => refresh();
      if (S.logo.complete) refresh();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
}



function doReset() {
  S.padColor='#ffffff'; S.text=''; S.deColor='#ffffff';
  S.logo=null; S.emboss=6; S.scale=75; S.pos='center'; S.type='number';
  document.getElementById('pc').value='#ffffff';
  document.getElementById('dc').value='#ffffff';
  document.getElementById('num-in').value='';
  document.getElementById('let-in').value='';
  document.getElementById('lthumb').style.display='none';
  document.getElementById('esl').value=6; document.getElementById('ssl').value=200;
  document.getElementById('ev').textContent=6; document.getElementById('sv').textContent=200;
  document.getElementById('phex').textContent='#ffffff';
  document.getElementById('dhex').textContent='#ffffff';
  document.querySelectorAll('.ttab').forEach(b=>b.classList.remove('on'));
  document.querySelector('.ttab').classList.add('on');
  document.querySelectorAll('.cpnl').forEach(p=>p.classList.remove('on'));
  document.getElementById('pnl-number').classList.add('on');

  loadModel(S.model);
  resetCam();
}

// ── Export ────────────────────────────────────────────────────────────────────
function openExport() {
  renderer.render(scene, camera);
  document.getElementById('pprev').src = renderer.domElement.toDataURL('image/png');
  document.getElementById('pov').classList.add('on');
}
function setSz(sz, btn) {
  exportSz = sz;
  document.querySelectorAll('.szopt').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}
function doDownload() {
  const wrap = document.getElementById('cvwrap');
  const m = exportSz==='4k'?4 : exportSz==='2k'?2 : 1;
  if (m > 1) {
    renderer.setSize(wrap.clientWidth*m, wrap.clientHeight*m);
    renderer.setPixelRatio(1);
    camera.aspect = wrap.clientWidth / wrap.clientHeight;
    camera.updateProjectionMatrix();
    renderer.render(scene, camera);
  }
  const a = document.createElement('a');
  a.href = renderer.domElement.toDataURL('image/png');
  a.download = `RedTail-${S.model}-${S.text||'custom'}.png`;
  a.click();
  if (m > 1) {
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    camera.updateProjectionMatrix();
  }
  document.getElementById('pov').classList.remove('on');
}
function doPrint() {
  const src = document.getElementById('pprev').src;
  const w = window.open('');
  w.document.write(`<html><head><title>RedTail</title><style>body{margin:0;background:#000}img{max-width:100%;display:block}</style></head><body><img src="${src}" onload="window.print();window.close()"></body></html>`);
  w.document.close();
  document.getElementById('pov').classList.remove('on');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Wait for Barlow Condensed to load so canvas text uses the correct brand font
  document.fonts.ready.then(() => requestAnimationFrame(init));
});
